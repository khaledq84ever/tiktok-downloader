<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#010101" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>TikSave — TikTok Video Downloader</title>
  <meta name="description" content="Download TikTok videos without watermark. Free, fast, no signup required." />
  <meta property="og:title" content="TikSave — TikTok Video Downloader" />
  <meta property="og:description" content="Download TikTok videos without watermark. Free, fast, no signup." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    /* Mobile: no 300ms tap delay, no blue tap flash, no callout. */
    button, a, input, .q-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    html, body { -webkit-touch-callout: none; }
    input, textarea { -webkit-touch-callout: default; -webkit-user-select: text; user-select: text; }

    :root {
      --bg:        #010101;
      --surface:   #0d0d0d;
      --surface2:  #161616;
      --surface3:  #1f1f1f;
      --border:    #2a2a2a;
      --border2:   #3a3a3a;
      --accent:    #fe2c55;
      --accent2:   #25f4ee;
      --success:   #10b981;
      --danger:    #ef4444;
      --text:      #f5f5f5;
      --text2:     #aaaaaa;
      --muted:     #555555;
      --radius:    18px;
      --radius-sm: 12px;
      --max-w:     700px;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      /* 100dvh handles iOS Safari's collapsing URL bar; 100vh is the fallback. */
      min-height: 100vh;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(254,44,85,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,244,238,0.02) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse, rgba(254,44,85,0.1) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    header, main, footer { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      padding: max(clamp(10px,2vw,18px), env(safe-area-inset-top)) 16px 0;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      text-align: center;
    }

    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #ff6b8a);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: #fff;
      box-shadow: 0 4px 16px rgba(254,44,85,0.4);
      flex-shrink: 0;
    }

    .logo-text {
      font-size: clamp(1.15rem,3.2vw,1.45rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .logo-text span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 6px;
      padding: 4px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.73rem; font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .live-badge .dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: clamp(16px,3vw,32px) 16px 24px;
    }

    .hero {
      text-align: center;
      max-width: 620px; width: 100%;
    }

    h1 {
      font-size: clamp(1.55rem,4.5vw,2.6rem);
      font-weight: 900;
      line-height: 1.14;
      letter-spacing: -0.04em;
    }

    h1 .grad {
      background: linear-gradient(135deg, var(--accent) 0%, #ff6b8a 40%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--text2);
      font-size: clamp(0.82rem,2vw,0.95rem);
      font-weight: 500;
      line-height: 1.5;
    }

    /* ── Converter ── */
    .converter {
      margin-top: 20px;
      width: 100%; max-width: var(--max-w);
    }

    .input-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      display: flex; gap: 6px; align-items: center;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .input-card:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(254,44,85,0.1), 0 6px 24px rgba(254,44,85,0.08);
    }

    .url-input {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: inherit; font-size: 1rem; font-weight: 500;
      padding: 13px 8px 13px 14px;
      min-width: 0;
    }

    .url-input::placeholder { color: var(--muted); font-weight: 400; }

    .btn-clear {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border: none; background: var(--surface2); color: var(--muted);
      border-radius: 8px; font-size: 0.75rem; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    @media (hover: hover) and (pointer: fine) {
      .btn-clear:hover { color: var(--text); background: var(--border); }
      .btn-paste:hover { border-color: var(--accent); color: var(--text); background: var(--surface3); }
      .btn-primary:hover { opacity: 0.9; box-shadow: 0 6px 24px rgba(254,44,85,0.5); }
      .q-btn:hover { border-color: var(--accent); color: var(--text); transform: translateY(-1px); }
      .btn-retry:hover { background: var(--danger); color: #fff; }
      .btn-download:hover { opacity: 0.92; }
      .btn-copy-link:hover { border-color: var(--accent); color: var(--text); }
      .btn-share:hover { border-color: var(--accent2); color: var(--text); }
      .btn-reset:hover { border-color: var(--accent); color: var(--text); }
      .footer-handle:hover { opacity: 0.72; }
    }
    /* Tap-press feedback for touch + mouse. */
    .btn-primary:active { transform: scale(0.97); }
    .btn-paste:active, .q-btn:active, .btn-download:active,
    .btn-copy-link:active, .btn-share:active, .btn-reset:active,
    .btn-retry:active, .btn-clear:active { transform: scale(0.97); }

    .btn-paste {
      flex-shrink: 0;
      padding: 10px 18px;
      border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text2);
      font-family: inherit; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; min-height: 46px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-primary {
      flex-shrink: 0;
      padding: 13px 26px; border: none; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), #c9003f);
      color: #fff;
      font-family: inherit; font-size: clamp(0.9rem,2.5vw,1rem); font-weight: 800;
      cursor: pointer; white-space: nowrap; min-height: 50px;
      box-shadow: 0 4px 18px rgba(254,44,85,0.35);
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; }

    /* ── Format selector ── */
    .quality-label {
      margin-top: 10px; margin-bottom: 6px;
      font-size: 0.68rem; font-weight: 800;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0 2px;
    }

    .quality-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .q-btn {
      padding: 10px 6px 9px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--muted);
      font-family: inherit;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s;
    }

    .q-title { font-size: 0.85rem; font-weight: 800; line-height: 1.2; }
    .q-sub   { font-size: 0.66rem; font-weight: 600; opacity: 0.75; }

    .q-btn.active {
      border-color: var(--accent);
      background: rgba(254,44,85,0.12);
      box-shadow: 0 0 0 1.5px var(--accent), 0 4px 14px rgba(254,44,85,0.2);
      color: var(--text);
    }
    .q-btn.active .q-title { color: #ff8fa3; }
    .q-btn.active .q-sub   { color: #ff8fa3; }

    .q-btn.audio-btn.active {
      border-color: var(--accent2);
      background: rgba(37,244,238,0.1);
      box-shadow: 0 0 0 1.5px var(--accent2), 0 4px 14px rgba(37,244,238,0.2);
    }
    .q-btn.audio-btn.active .q-title { color: var(--accent2); }
    .q-btn.audio-btn.active .q-sub   { color: var(--accent2); }

    /* ── Error ── */
    .error-wrap {
      margin-top: 12px;
      background: rgba(239,68,68,0.07);
      border: 1px solid rgba(239,68,68,0.22);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      display: none;
      align-items: center; justify-content: space-between; gap: 10px;
    }
    .error-msg  { color: var(--danger); font-size: 0.86rem; font-weight: 600; flex: 1; }
    .btn-retry  {
      flex-shrink: 0; padding: 7px 16px;
      border: 1.5px solid var(--danger); border-radius: 8px;
      background: transparent; color: var(--danger);
      font-family: inherit; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }

    /* ── Video card ── */
    .video-card {
      margin-top: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      animation: fadeUp 0.38s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(254,44,85,0.06);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .video-card-inner {
      display: flex; align-items: center; gap: 12px;
      padding: 12px;
    }

    .video-thumb {
      flex-shrink: 0;
      width: 68px; height: 106px;
      border-radius: 8px; object-fit: cover;
      background: var(--surface2);
    }

    .video-meta { flex: 1; min-width: 0; }

    .video-title {
      font-size: 0.95rem; font-weight: 700; line-height: 1.4;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }

    .video-sub {
      margin-top: 4px;
      font-size: 0.78rem; font-weight: 500;
      color: var(--muted);
    }

    .video-badges {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 8px;
    }

    .quality-badge {
      padding: 3px 9px; border-radius: 6px;
      background: rgba(254,44,85,0.15);
      border: 1px solid rgba(254,44,85,0.28);
      color: #ff8fa3;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.04em;
    }

    .card-actions { padding: 0 12px 12px; }

    .progress-wrap {
      height: 4px; background: var(--surface2);
      border-radius: 99px; overflow: hidden;
      margin-bottom: 8px; display: none;
    }

    .progress-bar {
      height: 100%; border-radius: 99px; width: 0%;
      background: linear-gradient(90deg, var(--accent), #ff6b8a, var(--accent2), var(--accent));
      background-size: 300% 100%;
      transition: width 0.5s ease;
      animation: flow 3s linear infinite;
    }

    @keyframes flow {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .status-text {
      font-size: 0.83rem; font-weight: 600; color: var(--muted);
      margin-bottom: 10px; display: none;
    }

    /* ── Download button ── */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5), 0 6px 22px rgba(16,185,129,0.28); }
      50%      { box-shadow: 0 0 0 14px rgba(16,185,129,0), 0 6px 22px rgba(16,185,129,0.14); }
    }

    .btn-download {
      width: 100%; padding: 14px 14px; border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--success), #059669);
      color: #fff;
      font-family: inherit; font-size: clamp(0.95rem,2.5vw,1.05rem); font-weight: 800;
      cursor: pointer; display: none;
      align-items: center; justify-content: center; gap: 10px;
      text-decoration: none; min-height: 50px;
      box-shadow: 0 4px 18px rgba(16,185,129,0.28);
      transition: opacity 0.2s;
    }
    .btn-download.pulse { animation: pulse-glow 1.8s ease-in-out infinite; }
    .btn-download svg { width: 20px; height: 20px; flex-shrink: 0; }

    .btn-row { display: flex; gap: 6px; margin-top: 7px; }

    .btn-copy-link {
      flex: 1; padding: 10px 10px;
      border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text2);
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; display: none;
      align-items: center; justify-content: center; gap: 6px;
      min-height: 42px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-copy-link.copied { color: var(--success); border-color: var(--success); }

    .btn-share {
      flex-shrink: 0; padding: 10px 14px;
      border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text2);
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; display: none;
      align-items: center; justify-content: center; gap: 6px;
      min-height: 42px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-reset {
      width: 100%; padding: 10px;
      border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; min-height: 42px; display: none; margin-top: 7px;
      transition: border-color 0.2s, color 0.2s;
    }

    /* ── Footer ── */
    footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 12px; flex-wrap: wrap;
    }

    .footer-brand {
      font-size: 0.92rem; font-weight: 900;
      letter-spacing: -0.03em; color: var(--text);
    }

    .footer-brand span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .footer-divider { color: var(--border2); }
    .footer-copy { font-size: 0.74rem; color: var(--muted); font-weight: 500; }

    .footer-handle {
      font-size: 0.85rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; transition: opacity 0.2s;
    }

    /* ── Responsive ── */
    @media (min-width: 640px) {
      .converter { max-width: 620px; }
    }

    @media (max-width: 639px) {
      footer {
        padding: 10px 12px;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
        gap: 8px;
      }
      main   { padding: 12px 12px 16px;
               padding-left: max(12px, env(safe-area-inset-left));
               padding-right: max(12px, env(safe-area-inset-right)); }
      header { padding: max(10px, env(safe-area-inset-top)) 12px 0; }
      .logo-icon { width: 32px; height: 32px; font-size: 0.95rem; }
      .converter { margin-top: 14px; }
      .input-card { padding: 6px; gap: 5px; }
      /* IMPORTANT: input must be >= 16px on iOS or Safari auto-zooms on focus. */
      .url-input  { padding: 12px 8px 12px 12px; font-size: 16px; min-height: 44px; }
      .btn-paste  { padding: 10px 14px; font-size: 0.82rem; min-height: 44px; }
      .btn-primary{ padding: 11px 16px; min-height: 44px; font-size: 0.92rem; }
      .btn-clear  { width: 40px; height: 40px; font-size: 0.9rem; }
      .q-btn      { padding: 10px 4px 9px; min-height: 56px; }
      .q-title    { font-size: 0.82rem; }
      .q-sub      { font-size: 0.62rem; }
      .video-card-inner { gap: 10px; padding: 10px; }
      .video-thumb { width: 60px; height: 94px; }
      .card-actions { padding: 0 10px 10px; }
      .footer-copy { display: none; }
      body::before { background-size: 32px 32px; opacity: 0.5; }
    }

    /* Very narrow phones: URL on its own row, buttons share the row below. */
    @media (max-width: 420px) {
      .input-card { flex-wrap: wrap; padding: 8px; gap: 8px; }
      .url-input  { flex: 1 1 100%; order: 1; padding: 13px 14px; }
      .btn-clear  { order: 2; }
      .btn-paste  { order: 3; flex: 1 1 0; min-width: 0; }
      .btn-primary{ order: 4; flex: 2 1 0; min-width: 0; font-size: 1rem; }
      .btn-row { flex-direction: column; }
      .btn-copy-link, .btn-share { flex: 1; width: 100%; }
    }

    /* Landscape phones: hide hero, tighten padding. */
    @media (max-height: 480px) and (orientation: landscape) {
      header { padding-top: 6px; }
      main { padding-top: 6px; padding-bottom: 6px; }
      .hero { display: none; }
      .converter { margin-top: 0; }
    }

    /* Respect reduced-motion preference. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">♪</div>
    <span class="logo-text">Tik<span>Save</span></span>
  </a>
  <div>
    <span class="live-badge"><span class="dot"></span> Free &amp; No Signup Required</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1>Download TikTok<br/><span class="grad">Without Watermark</span></h1>
    <p class="subtitle">Paste any TikTok link — download video in HD or extract audio</p>
  </div>

  <div class="converter">

    <div class="input-card">
      <input type="url" class="url-input" id="urlInput"
        placeholder="Paste a TikTok link here…"
        autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" inputmode="url" />
      <button class="btn-clear" id="btnClear" onclick="clearInput()" title="Clear">✕</button>
      <button class="btn-paste" id="btnPaste" onclick="pasteUrl()">Paste</button>
      <button class="btn-primary" id="btnConvert" onclick="handleConvert()">Download</button>
    </div>

    <p class="quality-label">Format &amp; Quality</p>
    <div class="quality-selector">
      <button class="q-btn active" data-fmt="mp4" data-q="hd" onclick="selectQuality(this)">
        <span class="q-title">MP4 ★</span>
        <span class="q-sub">HD Best</span>
      </button>
      <button class="q-btn" data-fmt="mp4" data-q="sd" onclick="selectQuality(this)">
        <span class="q-title">MP4</span>
        <span class="q-sub">SD 480p</span>
      </button>
      <button class="q-btn audio-btn" data-fmt="mp3" data-q="hd" onclick="selectQuality(this)">
        <span class="q-title">MP3</span>
        <span class="q-sub">Audio</span>
      </button>
    </div>

    <div class="error-wrap" id="errorWrap">
      <span class="error-msg" id="errorMsg"></span>
      <button class="btn-retry" onclick="handleConvert()">Try again</button>
    </div>

    <div class="video-card" id="videoCard">
      <div class="video-card-inner">
        <img class="video-thumb" id="videoThumb" src="" alt="" />
        <div class="video-meta">
          <div class="video-title" id="videoTitle"></div>
          <div class="video-sub"   id="videoSub"></div>
          <div class="video-badges">
            <span class="quality-badge" id="qualityBadge">HD MP4</span>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <p class="status-text" id="statusText"></p>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <a class="btn-download" id="btnDownload" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download
        </a>
        <div class="btn-row">
          <button class="btn-copy-link" id="btnCopyLink" onclick="copyDownloadLink()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy link
          </button>
          <button class="btn-share" id="btnShare" onclick="shareDownload()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share
          </button>
        </div>
        <button class="btn-reset" id="btnReset" onclick="resetForm()">↩ Download another video</button>
      </div>
    </div>

  </div>
</main>

<footer>
  <span class="footer-brand">♪ Tik<span>Save</span></span>
  <span class="footer-divider">·</span>
  <span class="footer-copy">For personal use only. Respect copyright laws.</span>
  <span class="footer-divider">·</span>
  <a class="footer-handle" href="https://twitter.com/KhaledQ84Ever" target="_blank">@KhaledQ84Ever</a>
</footer>

<script>
  const BASE_PATH = '{{ base_path }}';
  let pollTimer = null;
  let currentDownloadUrl = null;
  let selectedFmt = localStorage.getItem('tt_fmt') || 'mp4';
  let selectedQ   = localStorage.getItem('tt_q')   || 'hd';

  const $ = id => document.getElementById(id);

  (function restoreQuality() {
    const btn = document.querySelector(`.q-btn[data-fmt="${selectedFmt}"][data-q="${selectedQ}"]`);
    if (btn) {
      document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  })();

  function selectQuality(btn) {
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFmt = btn.dataset.fmt;
    selectedQ   = btn.dataset.q;
    localStorage.setItem('tt_fmt', selectedFmt);
    localStorage.setItem('tt_q',   selectedQ);
  }

  async function pasteUrl() {
    try {
      const text = await navigator.clipboard.readText();
      if (text) {
        $('urlInput').value = text;
        updateClearBtn();
        if (text.includes('tiktok.com')) handleConvert();
      }
    } catch { $('urlInput').focus(); }
  }

  function clearInput() {
    $('urlInput').value = '';
    $('btnClear').style.display = 'none';
    $('urlInput').focus();
  }

  function updateClearBtn() {
    $('btnClear').style.display = $('urlInput').value ? 'flex' : 'none';
  }

  function showError(msg) {
    $('errorMsg').textContent = msg;
    $('errorWrap').style.display = 'flex';
  }

  function hideError() {
    $('errorWrap').style.display = 'none';
  }

  function setConverting(on) {
    $('btnConvert').disabled = on;
    $('btnConvert').textContent = on ? 'Loading…' : 'Download';
    $('urlInput').disabled = on;
  }

  // Reliable cross-browser download: fetch as Blob, click an <a> at the blob URL.
  // This is the only approach that consistently triggers a real "Save File" dialog
  // on iOS Safari 13+ and Chrome Android instead of opening the MP4 inline.
  async function triggerDownload(url, filename, button) {
    const originalHtml = button ? button.innerHTML : null;
    try {
      if (button) {
        button.innerHTML = '<span style="display:inline-block;animation:spin 0.8s linear infinite">⟳</span> Preparing…';
        button.style.pointerEvents = 'none';
      }
      const res = await fetch(url, { credentials: 'same-origin' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Revoke after a moment so the browser has time to start the save.
      setTimeout(() => URL.revokeObjectURL(blobUrl), 4000);
    } catch (err) {
      // Blob path failed (offline, CORS, OOM on huge file) — fall back to a
      // plain navigation. Better to open the file than show nothing.
      window.location.href = url;
    } finally {
      if (button && originalHtml !== null) {
        button.innerHTML = originalHtml;
        button.style.pointerEvents = '';
      }
    }
  }

  function _safeName(title, ext) {
    const safe = (title || 'tiktok').replace(/[\\/:*?"<>|]+/g, ' ')
      .replace(/\s+/g, ' ').trim().slice(0, 80);
    return safe + '.' + (ext || 'mp4');
  }

  function _dlIcon() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>';
  }

  function showDirectResult(d) {
    $('videoThumb').src         = d.thumbnail || '';
    $('videoTitle').textContent = d.title || 'TikTok Video';
    $('videoSub').textContent   = `@${d.uploader || 'tiktok'}  ·  ${d.duration || ''}`;
    $('qualityBadge').textContent = 'Multiple formats';
    $('videoCard').style.display = 'block';

    $('btnDownload').style.display = 'none';
    let actions = $('directActions');
    if (!actions) {
      actions = document.createElement('div');
      actions.id = 'directActions';
      actions.style.cssText = 'display:flex;flex-direction:column;gap:8px;padding:0 12px 4px;';
      $('btnDownload').parentNode.insertBefore(actions, $('btnDownload'));
    }
    actions.innerHTML = '';

    const list = (d.downloads && d.downloads.length) ? d.downloads
      : [{label: 'Download MP4', url: d.download_url, kind: 'video', ext: 'mp4'}];

    list.forEach((dl, idx) => {
      const a = document.createElement('a');
      const isAudio = dl.kind === 'audio';
      const isWM    = /watermark\)/i.test(dl.label) && !/no/i.test(dl.label);
      const filename = _safeName(d.title, dl.ext || 'mp4');
      // Route the CDN URL through our /stream proxy so the response has
      // Content-Disposition: attachment and is same-origin (lets us use the
      // blob-download trick that works on iOS Safari & Chrome Android).
      const proxiedUrl = BASE_PATH + '/stream?u=' + encodeURIComponent(dl.url) +
                                   '&n=' + encodeURIComponent(filename);
      a.href = proxiedUrl;
      a.rel = 'noopener';
      a.download = filename;
      a.style.cssText = [
        'display:flex','align-items:center','justify-content:center','gap:10px',
        'padding:13px 14px','min-height:50px',
        'font-family:inherit','font-size:clamp(0.92rem,2.5vw,1.02rem)','font-weight:800',
        'text-decoration:none','border-radius:12px',
        isAudio
          ? 'background:linear-gradient(135deg,#25f4ee,#0fb5b0);color:#04282a;box-shadow:0 4px 18px rgba(37,244,238,0.32)'
          : isWM
          ? 'background:var(--surface2);color:var(--text);border:1.5px solid var(--border2)'
          : 'background:linear-gradient(135deg,var(--success),#059669);color:#fff;box-shadow:0 4px 18px rgba(16,185,129,0.28)',
      ].join(';');
      a.innerHTML = `<span style="width:18px;height:18px;display:inline-flex;flex-shrink:0">${_dlIcon()}</span><span>${dl.label}</span>`;
      a.onclick = (e) => {
        e.preventDefault();
        triggerDownload(proxiedUrl, filename, a);
      };
      actions.appendChild(a);
      if (idx === 0) {
        currentDownloadUrl = proxiedUrl;
        // Do NOT auto-click on mobile — it opens the video inline in a new tab
        // instead of downloading. User taps the visible button.
      }
    });

    $('btnCopyLink').style.display = 'flex';
    if (navigator.share) $('btnShare').style.display = 'flex';
    $('btnReset').style.display = 'block';
    setConverting(false);
  }

  async function tryDirect(url) {
    try {
      const res = await fetch(BASE_PATH + '/direct', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (res.ok && data.download_url) return data;
    } catch {}
    return null;
  }

  async function handleConvert() {
    clearInterval(pollTimer);
    const url = $('urlInput').value.trim();
    if (!url) { showError('Please paste a TikTok URL'); return; }

    hideError();
    $('videoCard').style.display    = 'none';
    $('btnDownload').style.display  = 'none';
    $('btnCopyLink').style.display  = 'none';
    $('btnShare').style.display     = 'none';
    $('btnReset').style.display     = 'none';
    $('progressWrap').style.display = 'none';
    $('statusText').style.display   = 'none';
    const _actions = $('directActions');
    if (_actions) _actions.innerHTML = '';
    currentDownloadUrl = null;
    setConverting(true);

    $('statusText').textContent   = 'Getting direct link…';
    $('statusText').style.display = 'block';

    // NOTE: previously this called tryDirect() / showDirectResult() to skip
    // the server-side download for MP4. That path proxied tikwm CDN URLs
    // through /stream, but tikwm URLs are time-limited and on mobile the
    // download triggered iOS Safari to open the /stream URL in a new tab,
    // which would show Railway's "Application failed to respond" page when
    // the proxy stalled. Always use the queue: server downloads to disk
    // first, then /download/{job_id} serves the local file — fast & reliable.

    try {
      $('statusText').textContent = 'Fetching video info…';

      const infoRes = await fetch(BASE_PATH + '/info', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const info = await infoRes.json();
      $('statusText').style.display = 'none';

      if (!infoRes.ok) { showError(info.error || 'Could not fetch video info'); setConverting(false); return; }

      $('videoThumb').src         = info.thumbnail;
      $('videoTitle').textContent = info.title || 'TikTok Video';
      $('videoSub').textContent   = `@${info.uploader}  ·  ${info.duration}`;

      const badgeMap = { 'mp4-hd': 'HD MP4', 'mp4-sd': 'SD MP4', 'mp3-hd': 'MP3 Audio' };
      $('qualityBadge').textContent = badgeMap[`${selectedFmt}-${selectedQ}`] || 'HD MP4';

      $('videoCard').style.display = 'block';

      const startRes = await fetch(BASE_PATH + '/start', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: info.url || url, title: info.title,
          format: selectedFmt, quality: selectedQ })
      });
      const startData = await startRes.json();
      if (!startRes.ok) { showError(startData.error || 'Failed to start download'); setConverting(false); return; }

      pollJob(startData.job_id);
    } catch {
      $('statusText').style.display = 'none';
      showError('Network error. Please try again.');
      setConverting(false);
    }
  }

  const STATUS_MSGS = ['Downloading…', 'Processing video…', 'Almost done…'];

  function pollJob(jobId) {
    $('progressWrap').style.display = 'block';
    $('statusText').style.display   = 'block';
    $('statusText').textContent     = 'Starting download…';

    let fake = 3, msgIdx = 0;
    $('progressBar').style.width = fake + '%';

    const grow = setInterval(() => {
      if (fake < 25) { fake += Math.random() * 3; $('progressBar').style.width = fake + '%'; }
    }, 1500);

    const msgCycle = setInterval(() => {
      if ($('statusText').textContent.startsWith('Downloading')) return;
      msgIdx = (msgIdx + 1) % STATUS_MSGS.length;
      $('statusText').textContent = STATUS_MSGS[msgIdx];
    }, 4000);

    let attempts = 0;
    pollTimer = setInterval(async () => {
      if (++attempts > 150) {
        clearInterval(pollTimer); clearInterval(grow); clearInterval(msgCycle);
        showError('Timed out. Please try again.'); setConverting(false);
        return;
      }
      try {
        const res  = await fetch(BASE_PATH + `/status/${jobId}`);
        const data = await res.json();

        if (data.progress != null && data.progress > fake) {
          clearInterval(grow);
          fake = data.progress;
          $('progressBar').style.width = fake + '%';
          if (data.progress < 95)
            $('statusText').textContent = `Downloading… ${data.progress}%`;
        }

        if (data.status === 'done') {
          clearInterval(pollTimer); clearInterval(grow); clearInterval(msgCycle);
          $('progressBar').style.width = '100%';
          $('statusText').textContent  = '✓ Ready! Tap Download below.';

          setTimeout(() => {
            $('progressWrap').style.display = 'none';
            $('statusText').style.display   = 'none';

            const dlUrl = BASE_PATH + `/download/${jobId}`;
            const filename = data.filename || 'tiktok.mp4';
            currentDownloadUrl = dlUrl;

            // NOTE: do NOT auto-click a programmatic <a download> here.
            // On iOS Safari (and some Chrome Android versions) the `download`
            // attribute is ignored for programmatic clicks, which causes the
            // browser to navigate to the MP4 URL and open it inline as a video
            // player — which looks like "audio only opened in a new tab" to
            // the user. Auto-download is a "nice to have" on desktop but flat
            // out broken on mobile, so we let the user tap the button below.

            const dl = $('btnDownload');
            // Important: do NOT set href/download on this anchor. iOS Safari's
            // download attribute on cross-origin or proxy URLs sometimes opens
            // a "preview" tab even when onclick calls preventDefault — which
            // is exactly the "new tab → Application failed to respond" bug
            // the user reported. We use href="#" + onclick only.
            dl.setAttribute('href', '#');
            dl.removeAttribute('download');
            const label = selectedFmt === 'mp3' ? 'Download MP3' : 'Download MP4';
            dl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ${label}`;
            dl.style.display = 'flex';
            dl.classList.add('pulse');
            setTimeout(() => dl.classList.remove('pulse'), 7000);

            dl.onclick = (e) => {
              e.preventDefault();
              triggerDownload(dlUrl, filename, dl);
            };

            $('btnCopyLink').style.display = 'flex';
            if (navigator.share) $('btnShare').style.display = 'flex';
            $('btnReset').style.display = 'block';
            setConverting(false);
          }, 400);

        } else if (data.status === 'error') {
          clearInterval(pollTimer); clearInterval(grow); clearInterval(msgCycle);
          $('progressWrap').style.display = 'none';
          $('statusText').style.display   = 'none';
          showError(data.error || 'Download failed. Please try again.');
          setConverting(false);
        }
      } catch {}
    }, 2000);
  }

  async function copyDownloadLink() {
    if (!currentDownloadUrl) return;
    const full = location.origin + currentDownloadUrl;
    try {
      await navigator.clipboard.writeText(full);
      $('btnCopyLink').textContent = '✓ Copied!';
      $('btnCopyLink').classList.add('copied');
      setTimeout(() => {
        $('btnCopyLink').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy link`;
        $('btnCopyLink').classList.remove('copied');
      }, 2000);
    } catch { prompt('Copy this link:', full); }
  }

  async function shareDownload() {
    if (!navigator.share || !currentDownloadUrl) return;
    try {
      await navigator.share({ title: $('videoTitle').textContent || 'TikTok Video',
        url: location.origin + currentDownloadUrl });
    } catch {}
  }

  function resetForm() {
    clearInterval(pollTimer);
    $('urlInput').value = '';
    updateClearBtn();
    ['videoCard','btnDownload','btnCopyLink','btnShare','btnReset',
     'errorWrap','progressWrap','statusText'].forEach(id => {
      const el = $(id);
      if (el) el.style.display = 'none';
    });
    const actions = $('directActions');
    if (actions) actions.innerHTML = '';
    currentDownloadUrl = null;
    setConverting(false);
    $('urlInput').focus();
  }

  $('urlInput').addEventListener('input',   updateClearBtn);
  $('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleConvert(); });
  $('urlInput').addEventListener('focus',   async () => {
    if ($('urlInput').value) return;
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.includes('tiktok.com')) {
        $('urlInput').value = text;
        updateClearBtn();
      }
    } catch {}
  });
</script>
</body>
</html>
